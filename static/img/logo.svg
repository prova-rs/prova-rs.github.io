<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Interim Prova mark: a "proof" checkmark bracketed like an executable
       expression — green means proven. Placeholder until the full logo lands.
       Sibling to archetect's compass "A": same stroke grammar, distinct glyph. -->
  <defs>
    <linearGradient id="p" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#p)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- brackets: an executable expression -->
    <path d="M42 26 L22 26 L22 102 L42 102"/>
    <path d="M86 26 L106 26 L106 102 L86 102"/>
    <!-- the proof: a checkmark -->
    <path d="M44 66 L58 82 L86 44"/>
  </g>
</svg>
